name: ACID
description: ACID (Atomicity, Consistency, Isolation, Durability) is a set of properties
  that guarantee database transactions are processed reliably even in the face of
  errors, power failures, or system crashes. These four properties ensure that data
  remains accurate and consistent, making ACID compliance a fundamental requirement
  for relational databases and financial systems.
